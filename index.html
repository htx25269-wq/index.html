<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKED BY DRAGON ETHICAL ZONE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Creepster&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #00ff00;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        .diagonal {
            position: absolute;
            top: 20px;
            left: -80px;
            transform: rotate(-45deg);
            background: #ff0000;
            color: white;
            padding: 8px 120px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 4px;
            z-index: 10;
            box-shadow: 0 0 15px #ff0000;
        }
        
        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .logo {
            width: 320px;
            height: 320px;
            border: 5px solid #ff0000;
            border-radius: 50%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 
                0 0 40px #ff0000,
                0 0 80px #00ff00,
                inset 0 0 30px rgba(255, 0, 0, 0.4);
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .afraid {
            width: 420px;
            margin: 20px 0 30px 0;
            border: 3px solid #ffffff;
            box-shadow: 0 0 30px #ff00ff;
        }
        
        .strike {
            color: #00ff00;
            font-size: 1.35rem;
            margin: 15px 0;
            letter-spacing: 3px;
        }
        
        .hashtag {
            background: #ffffff;
            color: #000000;
            padding: 8px 15px;
            font-size: 1.1rem;
            margin: 12px 0;
            display: inline-block;
            font-weight: bold;
        }
        
        .hacked-by {
            color: #ff0000;
            font-size: 1.4rem;
            margin: 20px 0 10px 0;
            letter-spacing: 2px;
        }
        
        .team {
            color: #00ffff;
            font-size: 1.5rem;
            margin-bottom: 25px;
            line-height: 1.8;
        }
        
        .main-hack {
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            margin: 15px 0;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #00ff00,
                0 0 40px #ffff00;
        }
        
        .green-bar {
            width: 100%;
            background: linear-gradient(to right, #00ff00, #00cc00);
            color: black;
            padding: 14px 0;
            margin-top: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 8px;
            box-shadow: 0 0 20px #00ff00;
        }
        
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 0, 0.1) 50%
            );
            background-size: 100% 8px;
            pointer-events: none;
            animation: scan 6s linear infinite;
            z-index: 3;
            opacity: 0.3;
        }
        
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }
    </style>
</head>
<body>
    <div class="diagonal">DRAGON HACKERS</div>
    
    <div class="container">
        <!-- Dragon Logo -->
        <img src="https://i.imgur.com/YOUR_DRAGON_LOGO_LINK.jpg" 
             alt="DRAGON ETHICAL ZONE" 
             class="logo"
             onerror="this.src='https://i.ibb.co/0jZqY8Z/dragon-ethical-zone.jpg';">
        
        <!-- Afraid of the Dark Image -->
        <img src="https://i.ibb.co/0jZqY8Z/afraid-dark.jpg" 
             alt="Are You Afraid of the Dark?" 
             class="afraid">
        
        <div class="strike">
            :- WE STRIKE FIRST | WE FUCK HARD | WE SHOW NO MERCY :-
        </div>
        
        <div class="hashtag">
            #PROFESSORHACKED • NOW YOU HAVE NOTHING TO LOSE • #LOLPWNED
        </div>
        
        <div class="hacked-by">HACKED BY :</div>
        <div class="team">
            PROFESSOR | MR ADE | SK MASTER | MH COBRA
        </div>
        
        <div class="main-hack" style="color:#ff0000;">
            HACKED BY <span style="color:#00ff00;">DRAGON ETHICAL ZONE</span>
        </div>
        
        <div class="green-bar">
            STRIKE FIRST &nbsp;&nbsp;&nbsp; FUCK HARD &nbsp;&nbsp;&nbsp; NO MERCY
        </div>
    </div>
    
    <div class="scanline"></div>

    <script>
        // Simple glitch effect on logo
        const logo = document.querySelector('.logo');
        setInterval(() => {
            logo.style.transform = 'scale(1.03)';
            setTimeout(() => {
                logo.style.transform = 'scale(1)';
            }, 180);
        }, 2800);
    </script>
</body>
</html>
