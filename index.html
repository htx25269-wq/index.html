<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
.card{
    width:360px;
    background:#222;
    color:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,255,0,.3);
}
.photo{
    width:100px;
    height:120px;
    background:#555;
    border-radius:6px;
    margin-bottom:15px;
}
.demo{
    color:red;
    font-weight:bold;
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}
h2{
    text-align:center;
    color:#00ff88;
}
</style>
</head>
<body>

<div class="card">
<div class="demo">REAL ID</div>

<h2>ID Card</h2>

<div class="photo"></div>

<p><b>Name:</b> Demo User</p>
<p><b>ID:</b> 123456789</p>
<p><b>Date of Birth:</b> 01 Jan 2000</p>

</div>

</body>
</html>
