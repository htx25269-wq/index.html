<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKED BY DRAGON ETHICAL ZONE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        /* Matrix Rain Background */
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }
        
        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .logo {
            width: 380px;
            height: 380px;
            border: 4px solid #00ff00;
            border-radius: 50%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 
                0 0 30px #00ff00,
                0 0 60px #00aa00,
                inset 0 0 40px rgba(0, 255, 0, 0.3);
            margin-bottom: 30px;
            animation: glow 2s infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 30px #00ff00, 0 0 60px #00aa00; }
            to { box-shadow: 0 0 50px #00ff00, 0 0 90px #00ff41, inset 0 0 60px rgba(0, 255, 0, 0.5); }
        }
        
        .hacked {
            font-size: 4.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-shadow: 
                0 0 10px #00ff00,
                0 0 20px #00ff00,
                0 0 40px #ff0000,
                0 0 60px #ff0000;
            animation: glitch 1.5s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); }
            100% { transform: translate(0); }
        }
        
        .we-are {
            font-size: 2.2rem;
            margin: 20px 0 15px 0;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff;
        }
        
        .names {
            font-size: 1.8rem;
            line-height: 2.4rem;
            margin-bottom: 25px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .bangla {
            font-size: 1.6rem;
            color: #ffff00;
            margin-top: 15px;
            text-shadow: 0 0 12px #ffff00;
        }
        
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 1.1rem;
            color: #555;
            letter-spacing: 4px;
        }
        
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 0, 0.08) 50%
            );
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 3;
            opacity: 0.4;
        }
        
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 600px; }
        }
    </style>
</head>
<body>
    <canvas class="matrix" id="matrix"></canvas>
    
    <div class="container">
        <img src="https://i.imgur.com/REPLACE_WITH_YOUR_IMAGE_LINK.jpg" 
             alt="DRAGON ETHICAL ZONE" 
             class="logo"
             onerror="this.src='https://via.placeholder.com/380x380/000000/00ff00?text=DRAGON+LOGO';">
        
        <div class="hacked">HACKED BY</div>
        <div class="hacked" style="color: #ff0000; font-size: 4.8rem; margin-top: -20px;">DRAGON ETHICAL ZONE</div>
        
        <div class="we-are">WE ARE</div>
        <div class="names">
            PROFESSOR<br>
            JACK DOWSON<br>
            BLACK COBRA
        </div>
        
        <div class="bangla">WE ARE BANGLADESHI</div>
        
        <div class="footer">
            ★ ETHICAL HACKING ★ BANGLADESH CYBER FORCE ★
        </div>
    </div>
    
    <div class="scanline"></div>

    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        
        const chars = '01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzবাংলা';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.floor(Math.random() * canvas.height / fontSize);
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff00';
            ctx.font = `${fontSize}px monospace`;
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(draw, 35);
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });
        
        // Click effect
        document.addEventListener('click', () => {
            document.body.style.background = '#110000';
            setTimeout(() => {
                document.body.style.background = '#000';
            }, 200);
        });
    </script>
</body>
</html>
