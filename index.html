<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacked By Dragon Ethical Zone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    overflow-x:hidden;
}

.container{
    text-align:center;
    padding-top:40px;
}

.logo{
    width:240px;
    height:240px;
    border-radius:50%;
    border:5px solid #00ff55;
    box-shadow:0 0 30px #00ff55;
    object-fit:cover;
}

h1{
    margin-top:25px;
    font-size:55px;
    color:#00ff55;
    text-shadow:0 0 20px #00ff55;
}

h2{
    margin-top:10px;
    color:#ff3333;
}

.line{
    width:80%;
    height:5px;
    background:#00ff55;
    margin:25px auto;
}

.info{
    font-size:22px;
    color:#fff;
    margin-top:15px;
}

.info span{
    color:#00ff55;
}

marquee{
    margin-top:30px;
    background:#00aa22;
    color:#fff;
    font-size:26px;
    padding:12px;
    font-weight:bold;
}

.footer{
    margin-top:35px;
    color:#888;
}

.glow{
    animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #00ff55;
}
to{
text-shadow:0 0 30px #00ff55;
}
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 class="glow">DRAGON ETHICAL ZONE</h1>

<h2>Cyber Security • Ethical Hacking • Learning</h2>

<div class="line"></div>

<div class="info">
Welcome to the <span>Dragon Ethical Zone</span> Community
</div>

<div class="info">
Learn • Practice • Protect
</div>

<marquee scrollamount="12">
DRAGON ETHICAL ZONE • ETHICAL HACKING • CYBER SECURITY • KNOWLEDGE • RESPONSIBILITY
</marquee>

<div class="footer">
HOW ARE YOU DEAR.
</div>

</div>

</body>
</html>
